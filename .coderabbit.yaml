# CodeRabbit Configuration
# https://docs.coderabbit.ai/guides/configure-coderabbit
language: en-US
reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  path_instructions:
    - path: "**/*"
      instructions: "Accessibility (a11y) is not a requirement for this project. Do not suggest or require semantic HTML, ARIA attributes, keyboard accessibility, or screen-reader considerations."
  auto_review:
    enabled: true
    drafts: false
chat:
  auto_reply: true
